name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          xcodebuild -project MacVitals.xcodeproj \
            -scheme MacVitals \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/MacVitals-Debug" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Build release configuration
        run: |
          xcodebuild -project MacVitals.xcodeproj \
            -scheme MacVitals \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/MacVitals-Release" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
